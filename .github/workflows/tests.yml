name: Tests

on:
  push:
    paths:
      - "monitor.py"
      - "conftest.py"
      - "tests/**"
      - "requirements*.txt"
      - ".github/workflows/tests.yml"
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest -v
