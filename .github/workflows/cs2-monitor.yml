name: CS2 Update Monitor

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "once = normal poll cycle, test = send one test push, test-repeat = send a short repeat-test"
        required: false
        default: "once"
        type: choice
        options:
          - once
          - test
          - test-repeat

permissions:
  contents: write

concurrency:
  group: cs2-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run
        env:
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_API_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}
        run: python monitor.py --${{ inputs.mode || 'once' }}

      - name: Commit updated state
        if: ${{ (inputs.mode || 'once') == 'once' }}
        run: |
          git config user.name "cs2-monitor-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "Update monitor state [skip ci]"
          git push
